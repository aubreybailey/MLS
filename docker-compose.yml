version: '3.8'

# NTFY_SERVER: base URL of your ntfy server (default 192.168.1.4, default port).
# Override in a .env file or the environment, e.g. NTFY_SERVER=http://192.168.1.4

services:
  # Web UI (default)
  web:
    build: .
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - PROJ_DATA=/opt/conda/envs/rental-search/share/proj
      - NTFY_SERVER=${NTFY_SERVER:-http://192.168.1.4}
      - SAVED_SEARCHES=/app/notify/saved_searches.json
      - NOTIFY_STATE=/app/notify/notify_state.json
    volumes:
      - ./data:/app/data:ro
      - ./notify:/app/notify          # writable: "Create notification" saves here

  # CLI for one-off searches
  # Usage: docker-compose run --rm cli "Providence, RI" --limit 50
  cli:
    build: .
    environment:
      - PROJ_DATA=/opt/conda/envs/rental-search/share/proj
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
    working_dir: /app/output
    entrypoint: ["python", "/app/search.py"]
    profiles:
      - cli

  # Daily saved-search notifier -> ntfy. Run from cron:
  #   docker compose run --rm notify
  # host networking so it can reach an ntfy server on your LAN reliably.
  notify:
    build: .
    network_mode: host
    environment:
      - PROJ_DATA=/opt/conda/envs/rental-search/share/proj
      - NTFY_SERVER=${NTFY_SERVER:-http://192.168.1.4}
      - SAVED_SEARCHES=/app/notify/saved_searches.json
      - NOTIFY_STATE=/app/notify/notify_state.json
    volumes:
      - ./data:/app/data:ro
      - ./notify:/app/notify
    working_dir: /app
    entrypoint: ["python", "/app/notify.py"]
    profiles:
      - notify
